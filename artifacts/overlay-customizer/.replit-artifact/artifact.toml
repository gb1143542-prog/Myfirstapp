kind = "mobile"
previewPath = "/"
title = "Overlay Customizer"
version = "1.0.0"
id = "artifacts/overlay-customizer"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20340

[services.development]
run = "pnpm --filter @workspace/overlay-customizer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/overlay-customizer", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/overlay-customizer", "run", "serve" ]

[services.env]
PORT = "20340"
BASE_PATH = "/"
