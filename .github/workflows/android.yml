name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -d "android native" ]; then
          cd "android native" && chmod +x gradlew
        elif [ -d "android-native" ]; then
          cd "android-native" && chmod +x gradlew
        else
          chmod +x gradlew || true
        fi

    - name: Build with Gradle
      run: |
        if [ -d "android native" ]; then
          cd "android native" && ./gradlew build --no-daemon
        elif [ -d "android-native" ]; then
          cd "android-native" && ./gradlew build --no-daemon
        else
          ./gradlew build --no-daemon
        fi
        il
