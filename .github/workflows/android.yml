name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -d "android native" ]; then
          cd "android native" && chmod +x gradlew
        elif [ -d "android-native" ]; then
          cd "android-native" && chmod +x gradlew
        else
          chmod +x gradlew || true
        fi

    - name: Clean and Build with Gradle
      run: |
        if [ -d "android native" ]; then
          cd "android native"
        elif [ -d "android-native" ]; then
          cd "android-native"
        fi
        
        # Pura puruna cache o temporary resource ku clean kariba
        ./gradlew clean
        
        # Missing resource generated file ku bypass kari direct assemble build kariba
        ./gradlew assembleDebug --no-daemon
        
