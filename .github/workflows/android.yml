name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: |
        if [ -d "android native" ]; then
          cd "android native" && chmod +x gradlew
        elif [ -d "android-native" ]; then
          cd "android-native" && chmod +x gradlew
        else
          chmod +x gradlew || true
        fi

    - name: Inject Missing Colors Everywhere & Build
      run: |
        if [ -d "android native" ]; then
          cd "android native"
        elif [ -d "android-native" ]; then
          cd "android-native"
        fi
        
        # Pura project re jouthi bi values folder achhi, sethi automatic missing colors inject kariba
        find . -type d -name "values" | while read -r dir; do
          echo "Injecting colors into $dir"
          cat << 'EOF' > "$dir/colors_fixed.xml"
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="neon_blue">#00FFFF</color>
              <color name="neon_blue_dim">#008B8B</color>
              <color name="dark_bg">#121212</color>
              <color name="accent_cyan">#E0FFFF</color>
              <color name="surface">#1F1F1F</color>
              <color name="text_primary">#FFFFFF</color>
          </resources>
        EOF
        done

        # Clean check and compile debug
        ./gradlew clean
        ./gradlew assembleDebug --no-daemon
        
